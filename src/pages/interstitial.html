<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Un instant</title>
  <link rel="stylesheet" href="interstitial.css">
</head>
<body>
  <main class="card" hidden>
    <div class="badge" id="badge"></div>
    <h1 id="title"></h1>
    <p id="subtitle"></p>

    <section id="friction-section" hidden>
      <label class="intent-label" for="intent" data-i18n="intent_label"></label>
      <textarea id="intent" rows="2" data-i18n-placeholder="intent_placeholder"></textarea>
    </section>

    <div class="actions">
      <button id="btn-leave" class="primary"></button>
      <button id="btn-continue" class="secondary" hidden disabled></button>
      <button id="btn-close" class="primary" hidden data-i18n="btn_close_tab"></button>
    </div>

    <p class="note" id="note"></p>
  </main>
  <script type="module" src="interstitial.js"></script>
</body>
</html>
