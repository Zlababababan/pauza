<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Décroche</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Décroche</h1>
    <span id="date"></span>
  </header>

  <p id="strict-banner" class="strict-banner" hidden></p>

  <div id="today"></div>
  <p class="empty" id="empty" hidden data-i18n="popup_empty"></p>

  <div id="panic" class="panic" hidden>
    <p id="panic-banner" class="panic-banner" hidden></p>
    <button id="panic-btn" class="panic-btn" data-i18n="panic_button" hidden></button>
    <div id="panic-confirm" hidden>
      <p class="panic-question" data-i18n="panic_confirm"></p>
      <div class="panic-choices">
        <button id="panic-yes" class="panic-yes" data-i18n="panic_yes"></button>
        <button id="panic-no" data-i18n="panic_no"></button>
      </div>
    </div>
  </div>

  <footer>
    <a id="open-dashboard" class="dash-link" href="#" data-i18n="dashboard_open"></a>
    <button id="open-options" data-i18n="popup_manage"></button>
    <div class="foot-row">
      <span id="support-links" class="support" hidden></span>
      <select id="lang-switcher" class="lang" title="Langue / Language"></select>
    </div>
  </footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
