<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Décroche — Options</title>
  <link rel="stylesheet" href="options.css">
  <link rel="stylesheet" href="../common/gate.css">
</head>
<body>
  <main hidden>
    <header>
      <div class="header-row">
        <h1>Décroche</h1>
        <select id="lang-switcher" class="lang" title="Langue / Language"></select>
      </div>
      <p class="tagline" data-i18n="options_tagline"></p>
    </header>

    <section>
      <h2 data-i18n="options_add_title"></h2>
      <form id="add-form">
        <div class="field">
          <label for="name" data-i18n-html="options_name_label"></label>
          <input id="name" type="text" data-i18n-placeholder="options_name_ph">
        </div>

        <div class="field">
          <label for="targets" data-i18n-html="options_targets_label"></label>
          <textarea id="targets" rows="3" required
            placeholder="tiktok.com&#10;youtube.com/shorts"></textarea>
          <p class="error" id="targets-error" hidden></p>
          <div class="chips" id="category-chips"></div>
          <p class="hint" data-i18n="options_categories_hint"></p>
        </div>

        <fieldset class="field">
          <legend data-i18n="options_severity_legend"></legend>
          <label class="radio">
            <input type="radio" name="severity" value="observe">
            <span data-i18n-html="options_sev_observe"></span>
          </label>
          <label class="radio">
            <input type="radio" name="severity" value="friction" checked>
            <span data-i18n-html="options_sev_friction"></span>
          </label>
          <label class="radio">
            <input type="radio" name="severity" value="quota">
            <span data-i18n-html="options_sev_quota"></span>
          </label>
          <label class="radio">
            <input type="radio" name="severity" value="block">
            <span data-i18n-html="options_sev_block"></span>
          </label>
        </fieldset>

        <fieldset class="field sub" id="friction-options">
          <legend data-i18n="options_friction_legend"></legend>
          <div class="inline-fields">
            <label><span data-i18n="options_friction_delay"></span>
              <span class="unit-field"><input id="friction-delay" type="number" min="3" max="120" value="10"> s</span>
            </label>
            <label><span data-i18n="options_friction_allow"></span>
              <span class="unit-field"><input id="allow-duration" type="number" min="1" max="120" value="5"> min</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="field sub" id="quota-options" hidden>
          <legend data-i18n="options_quota_legend"></legend>
          <label class="inline-label"><span data-i18n="options_quota_label"></span>
            <span class="unit-field"><input id="quota-minutes" type="number" min="1" max="600" value="30"> min</span>
          </label>
          <p class="hint" data-i18n="options_quota_hint"></p>
        </fieldset>

        <fieldset class="field sub" id="block-options" hidden>
          <legend data-i18n="options_block_legend"></legend>
          <label class="radio">
            <input type="radio" name="blockAction" value="interstitial" checked>
            <span data-i18n="options_block_interstitial"></span>
          </label>
          <label class="radio">
            <input type="radio" name="blockAction" value="closeTab">
            <span data-i18n="options_block_closetab"></span>
          </label>
        </fieldset>

        <fieldset class="field sub" id="schedule-options">
          <legend>
            <label class="radio">
              <input type="checkbox" id="schedule-enabled">
              <span data-i18n-html="options_schedule_legend"></span>
            </label>
          </legend>
          <div id="schedule-fields" hidden>
            <div class="days" id="schedule-days"></div>
            <div class="inline-fields">
              <label><span data-i18n="options_schedule_from"></span>
                <span class="unit-field"><input id="schedule-from" type="time" value="09:00"></span>
              </label>
              <label><span data-i18n="options_schedule_to"></span>
                <span class="unit-field"><input id="schedule-to" type="time" value="18:00"></span>
              </label>
            </div>
            <p class="hint" data-i18n="options_schedule_hint"></p>
          </div>
        </fieldset>

        <button type="submit" class="primary" data-i18n="options_submit"></button>
      </form>
    </section>

    <section>
      <h2 data-i18n="options_rules_title"></h2>
      <div id="rules-list"></div>
      <p class="empty" id="rules-empty" hidden data-i18n="options_rules_empty"></p>
    </section>

    <section id="strict-section">
      <h2 data-i18n="strict_title"></h2>
      <p class="hint" data-i18n="strict_desc"></p>
      <p id="incognito-status" class="hint"></p>
      <button id="incognito-open" data-i18n="strict_incognito_open" hidden></button>
      <p id="strict-status" class="strict-status"></p>
      <div class="strict-actions" id="strict-actions"></div>
    </section>

    <section id="discreet-section">
      <h2 data-i18n="discreet_title"></h2>
      <p class="hint" data-i18n="discreet_desc"></p>
      <label class="radio">
        <input type="checkbox" id="discreet-blur">
        <span data-i18n="discreet_blur"></span>
      </label>
      <p class="hint" data-i18n="discreet_blur_hint"></p>
      <p id="pin-status" class="strict-status"></p>
      <div class="pin-fields">
        <input id="pin-current" type="password" inputmode="numeric" autocomplete="off" hidden
          data-i18n-placeholder="pin_current_ph">
        <input id="pin-new" type="password" inputmode="numeric" autocomplete="off"
          data-i18n-placeholder="pin_new_ph">
        <button id="pin-set"></button>
        <button id="pin-remove" class="danger" hidden data-i18n="pin_remove"></button>
      </div>
      <p class="error" id="pin-error" hidden></p>
    </section>

    <footer class="support" id="support" hidden>
      <p><span data-i18n="support_line"></span>
        <a id="support-kofi" target="_blank" rel="noopener" hidden></a>
        <span id="support-sep" hidden> · </span>
        <a id="support-paypal" target="_blank" rel="noopener" hidden></a>
      </p>
    </footer>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
